<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sana a Rou — Portal Interno</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;min-height:100vh}
    .btn{cursor:pointer;border:none;font-family:inherit}
    input,select{font-family:inherit;outline:none}
    table{width:100%;border-collapse:collapse}
    th,td{padding:7px 10px;font-size:11px}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const G="#4a6741",GD="#2d3f28",GL="#e8f0e0",AM="#d97706",RD="#dc2626",GR="#6b7280";

const USERS={
admin:{nombre:“Administración”,pass:“sar2026”,rol:“admin”,emoji:“👩‍💼”,color:G,acceso:[“ventas”,“finanzas”,“produccion”,“recetas”]},
sergio:{nombre:“Sergio”,pass:“sergio2026”,rol:“director”,emoji:“👔”,color:GD,acceso:[“ventas”,“finanzas”]},
nina:{nombre:“Nina”,pass:“nina2026”,rol:“cocina”,emoji:“👩‍🍳”,color:”#7c3aed”,acceso:[“produccion”,“recetas”]},
rodrigo:{nombre:“Rodrigo”,pass:“rod2026”,rol:“ventas”,emoji:“🤝”,color:AM,acceso:[“ventas”]},
helen:{nombre:“Helen”,pass:“helen2026”,rol:“fábrica”,emoji:“👷”,color:”#0891b2”,acceso:[“produccion”]},
claudis:{nombre:“Claudis”,pass:“claudis2026”,rol:“fábrica”,emoji:“👷”,color:”#0891b2”,acceso:[“produccion”]},
};

const ventasMes=[
{cliente:“Grupo Disco”,feb:884,mar:1023,abr:570,color:G},
{cliente:“Tienda Inglesa”,feb:225,mar:245,abr:210,color:AM},
{cliente:“BQB”,feb:80,mar:40,abr:140,color:”#0891b2”},
{cliente:“Pedidos Ya”,feb:100,mar:70,abr:0,color:”#7c3aed”},
{cliente:“Provaca”,feb:0,mar:60,abr:10,color:GR},
];

const sabores=[
{s:“Choco”,mar:241,feb:408,color:”#3a1f10”},
{s:“Pistacho”,mar:260,feb:429,color:G},
{s:“Avellana”,mar:269,feb:365,color:”#6a4030”},
{s:“Caramelo”,mar:190,feb:315,color:AM},
];

const gastos=[
{c:“Sueldos Nina + Rodrigo + Admin”,m:7500,t:“fijo”},
{c:“Helen y Claudis”,m:1667,t:“fijo”},
{c:“Liz (consultora)”,m:1900,t:“temporal”},
{c:“Alquiler fábrica”,m:1000,t:“fijo”},
{c:“Logística”,m:1000,t:“variable”},
{c:“Servicios fábrica”,m:500,t:“variable”},
];

const prodHoy=[
{s:“Chocolate Amargo 180g”,obj:80,prod:72},
{s:“Maní y Caramelo 180g”,obj:60,prod:60},
{s:“Limón y Pistacho 180g”,obj:40,prod:35},
{s:“Avellanas 900g”,obj:20,prod:18},
];

const novedadesInit=[
{autor:“Helen”,texto:“Faltó eritritol para lote de caramelo”,hora:“08:42”,color:”#0891b2”},
{autor:“Claudis”,texto:“Abatidor tarda más de lo normal”,hora:“10:15”,color:”#0891b2”},
];

// STATE
let state={user:null,seccion:null,loginKey:“admin”,loginPass:””,error:””,prod:[…prodHoy.map(p=>({…p}))],novedades:[…novedadesInit],novTexto:””};

function setState(patch){Object.assign(state,patch);render();}

// HELPERS
function bar(pct,color,h=8){
return `<div style="background:#e5e7eb;border-radius:4px;height:${h}px;overflow:hidden"><div style="background:${color};width:${Math.min(pct,100)}%;height:${h}px;border-radius:4px"></div></div>`;
}
function kpi(label,value,sub,color=G){
return `<div style="background:#fff;border-radius:8px;padding:12px 14px;border-top:3px solid ${color};flex:1;min-width:110px"> <div style="font-size:9px;color:${GR};text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">${label}</div> <div style="font-size:20px;font-weight:900;color:${color}">${value}</div> ${sub?`<div style="font-size:10px;color:${GR};margin-top:2px">${sub}</div>`:””}

  </div>`;
}
function header(titulo){
  return `<div style="background:${GD};padding:12px 16px;display:flex;align-items:center;gap:12px">
    <button class="btn" onclick="setState({seccion:null})" style="background:rgba(255,255,255,0.1);color:#fff;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600">← Volver</button>
    <div style="font-size:14px;font-weight:900;color:#fff">${titulo}</div>
  </div>`;
}

// SECCIONES
function renderVentas(){
const totAbr=ventasMes.reduce((s,r)=>s+r.abr,0);
const totMar=ventasMes.reduce((s,r)=>s+r.mar,0);
const maxAbr=Math.max(…ventasMes.map(x=>x.abr));
const maxMar=Math.max(…sabores.map(x=>x.mar));
return ` <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap"> ${kpi("Unidades abril",totAbr,"equiv. 180g",G)} ${kpi("vs marzo",`${totMar>totAbr?“▼”:“▲”} ${Math.abs(Math.round((totAbr-totMar)/totMar*100))}%`,"tendencia",totMar>totAbr?RD:G)} ${kpi("Facturación est.","$"+Math.round(totAbr*270/42)+" USD","prom. $270 UYU",AM)} </div> <div style="background:#fff;border-radius:8px;overflow:hidden;margin-bottom:12px"> <div style="background:${GD};color:#fff;padding:8px 12px;font-weight:700;font-size:12px">Consumo por cliente — 180g</div> <table> <thead><tr style="background:#f9fafb"> <th style="text-align:left;color:${GD}">Cliente</th><th style="text-align:right;color:${GD}">Feb</th><th style="text-align:right;color:${GD}">Mar</th><th style="text-align:right;color:${GD}">Abr</th><th style="color:${GD}">Tend.</th> </tr></thead> <tbody> ${ventasMes.map((r,i)=>`<tr style=“background:${i%2===0?”#fff”:”#f9fafb”}”>
<td style="font-weight:600;color:${r.color}">${r.cliente}</td>
<td style="text-align:right;color:${GR}">${r.feb||”—”}</td>
<td style="text-align:right;color:${GR}">${r.mar||”—”}</td>
<td style="text-align:right;font-weight:700;color:${r.abr===0?RD:G}">${r.abr||“⚠️ 0”}</td>
<td style="width:100px">${bar(r.abr/maxAbr*100,r.color)}</td>
</tr>`).join("")} </tbody> </table> </div> <div style="background:#fff;border-radius:8px;padding:14px"> <div style="font-weight:700;font-size:12px;color:${GD};margin-bottom:10px">Ventas por sabor — 180g</div> ${sabores.map(s=>`
<div style="margin-bottom:10px">
<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
<span style="font-weight:600;color:${s.color}">${s.s}</span>
<span style="color:${GR}">Mar: ${s.mar} · Feb: ${s.feb}</span>
</div>
${bar(s.mar/maxMar*100,s.color,10)}
</div>`).join("")} </div>`;
}

function renderFinanzas(){
const tot=gastos.reduce((s,g)=>s+g.m,0);
const ing=4285, def=ing-tot;
const catColor=t=>t===“fijo”?G:t===“variable”?AM:”#7c3aed”;
const catBg=t=>t===“fijo”?”#dcfce7”:t===“variable”?”#fef9c3”:”#ede9fe”;
return ` <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap"> ${kpi("Ingresos abril","$"+ing.toLocaleString(),"USD estimado",G)} ${kpi("Gastos fijos","$"+tot.toLocaleString(),"USD/mes",AM)} ${kpi("Resultado",(def>=0?"+":"-")+"$"+Math.abs(def),"neto del mes",def>=0?G:RD)} </div> <div style="background:#fff;border-radius:8px;overflow:hidden"> <div style="background:${GD};color:#fff;padding:8px 12px;font-weight:700;font-size:12px">Estructura de gastos</div> <table> <thead><tr style="background:#f9fafb"> <th style="text-align:left;color:${GD}">Concepto</th><th style="text-align:right;color:${GD}">USD</th><th style="text-align:right;color:${GD}">Tipo</th><th style="color:${GD}">%</th> </tr></thead> <tbody> ${gastos.map((g,i)=>`<tr style=“background:${i%2===0?”#fff”:”#f9fafb”}”>
<td style="font-weight:600;color:${GD}">${g.c}</td>
<td style="text-align:right">$${g.m.toLocaleString()}</td>
<td style="text-align:right"><span style="font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;background:${catBg(g.t)};color:${catColor(g.t)}">${g.t}</span></td>
<td style="width:100px">${bar(g.m/tot*100,catColor(g.t))}</td>
</tr>`).join("")} </tbody> <tfoot><tr style="background:${GD};color:#fff"> <td style="font-weight:700">TOTAL</td><td style="text-align:right;font-weight:700">$${tot.toLocaleString()}</td><td></td><td></td> </tr></tfoot> </table> </div>`;
}

function renderProduccion(){
const {prod,novedades,novTexto}=state;
const total=prod.reduce((s,p)=>s+p.prod,0);
const obj=prod.reduce((s,p)=>s+p.obj,0);
return ` <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap"> ${kpi("Objetivo hoy",obj,"tortas equiv.",G)} ${kpi("Producido",total,"hasta ahora",AM)} ${kpi("Avance",Math.round(total/obj*100)+"%","del objetivo","#0891b2")} </div> <div style="background:#fff;border-radius:8px;overflow:hidden;margin-bottom:12px"> <div style="background:${GD};color:#fff;padding:8px 12px;font-weight:700;font-size:12px">📋 Producción del día — ${new Date().toLocaleDateString("es-UY")}</div> ${prod.map((p,i)=>`
<div style=“padding:12px 14px;border-bottom:1px solid #f3f4f6;background:${i%2===0?”#fff”:”#f9fafb”}”>
<div style="display:flex;justify-content:space-between;margin-bottom:6px">
<span style="font-weight:600;font-size:12px;color:${GD}">${p.s}</span>
<span style="font-size:11px;color:${GR}">Obj: ${p.obj}</span>
</div>
<div style="display:flex;align-items:center;gap:10px">
<div style="flex:1">${bar(p.prod/p.obj*100,p.prod>=p.obj?G:AM,12)}</div>
<button class="btn" onclick="cambiarProd(${i},-1)" style="width:28px;height:28px;border-radius:4px;border:1px solid #e5e7eb;background:#fff;font-weight:700;font-size:16px">-</button>
<span style="font-weight:900;font-size:14px;color:${p.prod>=p.obj?G:AM};min-width:32px;text-align:center">${p.prod}</span>
<button class="btn" onclick="cambiarProd(${i},1)" style="width:28px;height:28px;border-radius:4px;border:1px solid ${G};background:${GL};font-weight:700;color:${G};font-size:16px">+</button>
</div>
</div>`).join("")} <div style="padding:10px 14px;background:${GD};display:flex;justify-content:space-between"> <span style="color:#fff;font-weight:700;font-size:12px">Total producido</span> <span style="color:#fff;font-weight:900;font-size:14px">${total} uds</span> </div> </div> <div style="background:#fff;border-radius:8px;overflow:hidden"> <div style="background:${GD};color:#fff;padding:8px 12px;font-weight:700;font-size:12px">💬 Novedades del día</div> <div style="padding:12px;max-height:180px;overflow-y:auto"> ${novedades.map(n=>`
<div style="margin-bottom:8px;padding:8px 10px;background:#f9fafb;border-radius:6px;border-left:3px solid ${n.color}">
<div style="display:flex;justify-content:space-between;margin-bottom:2px">
<span style="font-weight:700;font-size:11px;color:${n.color}">${n.autor}</span>
<span style="font-size:10px;color:${GR}">${n.hora}</span>
</div>
<div style="font-size:11px;color:#374151">${n.texto}</div>
</div>`).join("")} </div> <div style="padding:10px;border-top:1px solid #e5e7eb;display:flex;gap:8px"> <input id="novInput" value="${novTexto}" oninput="setState({novTexto:this.value})" onkeydown="if(event.key==='Enter')enviarNov()" placeholder="Reportar novedad..." style="flex:1;padding:8px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:11px"/> <button class="btn" onclick="enviarNov()" style="background:${G};color:#fff;border-radius:6px;padding:8px 14px;font-weight:700;font-size:11px">Enviar</button> </div> </div>`;
}

let recAbierta=null;
function renderRecetas(){
const recetas=[
{nombre:“Base frutos secos”,ing:[“Almendras 200g”,“Castañas 150g”,“Maní 100g”,“Aceite coco 50ml”],pasos:[“Procesar en cutter 3 min”,“Agregar aceite de coco”,“Presionar en molde”,“Abatir 15 min”]},
{nombre:“Relleno Chocolate Amargo”,ing:[“Cacao puro 80g”,“Proteína cáñamo 60g”,“Eritritol 40g”,“Vainilla 5ml”],pasos:[“Mezclar secos”,“Incorporar líquidos”,“Dosificar sobre base”,“Abatir 20 min”]},
];
return `<div style="background:#fff;border-radius:8px;padding:14px"> <div style="font-weight:700;font-size:12px;color:${GD};margin-bottom:10px">📖 Manual de recetas — Confidencial</div> ${recetas.map((r,i)=>`
<div onclick=“toggleRec(${i})” style=“display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:${recAbierta===i?GL:”#f9fafb”};border-radius:6px;cursor:pointer;margin-bottom:4px;border:1px solid ${recAbierta===i?G:”#e5e7eb”}”>
<span style="font-weight:600;font-size:12px;color:${recAbierta===i?G:GD}">${r.nombre}</span>
<span style="color:${G}">${recAbierta===i?“▲”:“▼”}</span>
</div>
${recAbierta===i?`<div style="padding:12px 14px;background:#fff;border:1px solid #e5e7eb;border-radius:0 0 6px 6px;margin-bottom:8px;display:grid;grid-template-columns:1fr 1fr;gap:14px"> <div> <div style="font-size:10px;font-weight:700;color:${G};text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Ingredientes</div> ${r.ing.map(x=>`<div style="font-size:11px;color:#374151;padding:3px 0;border-bottom:1px solid #f3f4f6">→ ${x}</div>`).join("")} </div> <div> <div style="font-size:10px;font-weight:700;color:${AM};text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Proceso</div> ${r.pasos.map((p,j)=>`<div style="font-size:11px;color:#374151;padding:3px 0;border-bottom:1px solid #f3f4f6">${j+1}. ${p}</div>`).join("")} </div> </div>`:””}
`).join(””)}

  </div>`;
}

// ACCIONES
window.cambiarProd=(i,delta)=>{
const p=[…state.prod];
p[i]={…p[i],prod:Math.max(0,p[i].prod+delta)};
setState({prod:p});
};
window.enviarNov=()=>{
if(!state.novTexto.trim())return;
const hora=new Date().toLocaleTimeString(“es-UY”,{hour:“2-digit”,minute:“2-digit”});
setState({novedades:[…state.novedades,{autor:state.user.nombre,texto:state.novTexto,hora,color:state.user.color}],novTexto:””});
};
window.toggleRec=(i)=>{recAbierta=recAbierta===i?null:i;render();};
window.setState=setState;

// LOGIN
function renderLogin(){
return `<div style="min-height:100vh;background:${GD};display:flex;align-items:center;justify-content:center;padding:20px"> <div style="background:#fff;border-radius:12px;padding:32px;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.3)"> <div style="text-align:center;margin-bottom:24px"> <div style="font-size:36px;margin-bottom:8px">🌿</div> <div style="font-size:22px;font-weight:900;color:${GD}">Sana a Rou</div> <div style="font-size:11px;color:${GR};margin-top:4px;letter-spacing:1px">PORTAL INTERNO</div> </div> <label style="font-size:11px;color:${GR};font-weight:600;display:block;margin-bottom:4px">Usuario</label> <select id="loginKey" style="width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;margin-bottom:12px"> ${Object.entries(USERS).map(([k,u])=>`<option value="${k}">${u.emoji} ${u.nombre}</option>`).join("")} </select> <label style="font-size:11px;color:${GR};font-weight:600;display:block;margin-bottom:4px">Contraseña</label> <input id="loginPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" style="width:100%;padding:10px 12px;border:1px solid ${state.error?"#fca5a5":"#e5e7eb"};border-radius:8px;font-size:13px;margin-bottom:${state.error?8:16}px"/> ${state.error?`<div style="color:${RD};font-size:11px;font-weight:600;margin-bottom:12px">⚠️ ${state.error}</div>`:””}
<button class="btn" onclick="doLogin()" style="width:100%;background:${G};color:#fff;border-radius:8px;padding:12px;font-weight:700;font-size:14px">Entrar</button>
</div>

  </div>`;
}
window.doLogin=()=>{
  const k=document.getElementById("loginKey").value;
  const p=document.getElementById("loginPass").value;
  const u=USERS[k];
  if(u&&p===u.pass){setState({user:{...u,key:k},error:"",loginPass:""});}
  else setState({error:"Contraseña incorrecta"});
};

// MENU
const SECS=[
{id:“ventas”,label:“📊 Ventas”,desc:“Tablero comercial”,color:G},
{id:“finanzas”,label:“💰 Finanzas”,desc:“Solo directivos”,color:AM},
{id:“produccion”,label:“🏭 Producción”,desc:“Producción del día”,color:”#0891b2”},
{id:“recetas”,label:“📖 Recetas”,desc:“Manual interno”,color:”#7c3aed”},
];
function renderMenu(){
const {user}=state;
const visibles=SECS.filter(s=>user.acceso.includes(s.id));
return `<div style="min-height:100vh;background:#f3f4f6"> <div style="background:${GD};padding:14px 20px;display:flex;justify-content:space-between;align-items:center"> <div> <div style="font-size:16px;font-weight:900;color:#fff">🌿 Sana a Rou</div> <div style="font-size:10px;color:#a5b4a0;letter-spacing:1px">PORTAL INTERNO</div> </div> <div style="display:flex;align-items:center;gap:10px"> <span style="font-size:18px">${user.emoji}</span> <div> <div style="font-weight:700;font-size:12px;color:#fff">${user.nombre}</div> <div style="font-size:10px;color:#a5b4a0">${user.rol}</div> </div> <button class="btn" onclick="setState({user:null,seccion:null})" style="background:rgba(255,255,255,0.1);color:#fff;border-radius:6px;padding:5px 12px;font-size:11px;margin-left:8px">Salir</button> </div> </div> <div style="padding:20px"> <div style="font-size:14px;color:${GD};font-weight:700;margin-bottom:16px">Bienvenida/o, ${user.nombre} 👋</div> <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"> ${visibles.map(s=>`
<button class="btn" onclick="setState({seccion:'${s.id}'})" style="background:#fff;border-radius:10px;padding:20px 16px;border:2px solid ${s.color}22;border-top:4px solid ${s.color};text-align:left;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
<div style="font-size:22px;margin-bottom:6px">${s.label.split(” “)[0]}</div>
<div style="font-weight:700;font-size:13px;color:${s.color}">${s.label.slice(3)}</div>
<div style="font-size:11px;color:${GR};margin-top:3px">${s.desc}</div>
</button>`).join(””)}
</div>
</div>

  </div>`;
}

// RENDER
function render(){
const {user,seccion}=state;
if(!user){document.getElementById(“app”).innerHTML=renderLogin();return;}
if(!seccion){document.getElementById(“app”).innerHTML=renderMenu();return;}
const sec=SECS.find(s=>s.id===seccion);
let content=””;
if(seccion===“ventas”)content=renderVentas();
else if(seccion===“finanzas”)content=renderFinanzas();
else if(seccion===“produccion”)content=renderProduccion();
else if(seccion===“recetas”)content=renderRecetas();
document.getElementById(“app”).innerHTML=` <div style="min-height:100vh;background:#f3f4f6"> ${header(sec.label)} <div style="padding:16px">${content}</div> </div>`;
}

render();
</script>

</body>
</html>
