const Bar = ({ pct, color, h = 8 }) => (
  <div style={{ background: "#e5e7eb", borderRadius: 4, height: h, overflow: "hidden" }}>
    <div style={{ background: color, width: `${Math.min(pct,100)}%`, height: h, borderRadius: 4 }} />
  </div>
);

const KPI = ({ label, value, sub, color = G }) => (
  <div style={{ background: "#fff", borderRadius: 8, padding: "12px 14px", borderTop: `3px solid ${color}`, flex: 1, minWidth: 110 }}>
    <div style={{ fontSize: 9, color: GR, textTransform: "uppercase", letterSpacing: 1, marginBottom: 3 }}>{label}</div>
    <div style={{ fontSize: 20, fontWeight: 900, color }}>{value}</div>
    {sub && <div style={{ fontSize: 10, color: GR, marginTop: 2 }}>{sub}</div>}
  </div>
);

function SecVentas() {
  const totalAbr = ventasMes.reduce((s,r)=>s+r.abr,0);

        <KPI label="Unidades abril" value={totalAbr} sub="equiv. 180g" color={G} />

        <KPI label="Facturación est." value={`$${(totalAbr*270/42).toFixed(0)} USD`} sub="prom. $270 UYU" color={AM} />
      </div>
      <div style={{ background:"#fff", borderRadius:8, overflow:"hidden", marginBottom:12 }}>
        <div style={{ background:GD, color:"#fff", padding:"8px 12px", fontWeight:700, fontSize:12 }}>Consumo por cliente — unidades 180g</div>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
          <thead>
            <tr style={{ background:"#f9fafb" }}>
              {["Cliente","Feb","Mar","Abr","Tendencia"].map(h=>(
                <th key={h} style={{ padding:"7px 10px", textAlign:h==="Cliente"||h==="Tendencia"?"left":"right", color:GD, fontWeight:700 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>

              <tr key={r.cliente} style={{ background:i%2===0?"#fff":"#f9fafb" }}>

                <td style={{ padding:"7px 10px", textAlign:"right", color:GR }}>{r.feb||"—"}</td>
                <td style={{ padding:"7px 10px", textAlign:"right", color:GR }}>{r.mar||"—"}</td>
                <td style={{ padding:"7px 10px", textAlign:"right", fontWeight:700, color:r.abr===0?RD:G }}>{r.abr||"⚠️ 0"}</td>
                <td style={{ padding:"7px 10px", width:100 }}>
                  <Bar pct={(r.abr/Math.max(...ventasMes.map(x=>x.abr)))*100} color={r.color} />

function SecFinanzas() {

  return (
    <div>
      <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap" }}>
        <KPI label="Ingresos abril" value={`$${ingresos.toLocaleString()}`} sub="USD estimado" color={G} />
        <KPI label="Gastos fijos" value={`$${totalGastos.toLocaleString()}`} sub="USD/mes" color={AM} />
        <KPI label="Resultado" value={deficit>=0?`+$${deficit}`:`-$${Math.abs(deficit)}`} sub="neto del mes" color={deficit>=0?G:RD} />
      </div>
      <div style={{ background:"#fff", borderRadius:8, overflow:"hidden" }}>

function SecProduccion({ user }) {
  const [prod, setProd] = useState(produccionHoy.map(p=>({...p})));
  const [texto, setTexto] = useState("");
  const [novedades, setNovedades] = useState([
    { autor:"Helen",  texto:"Faltó eritritol para lote de caramelo", hora:"08:42", color:"#0891b2" },
    { autor:"Claudis",texto:"Abatidor tarda más de lo normal hoy",   hora:"10:15", color:"#0891b2" },
  ]);
  const total = prod.reduce((s,p)=>s+p.producido,0);
  const objetivo = prod.reduce((s,p)=>s+p.objetivo,0);

  const enviar = () => {
    if (!texto.trim()) return;
    setNovedades(n=>[...n,{ autor:user.nombre, texto, hora:new Date().toLocaleTimeString("es-UY",{hour:"2-digit",minute:"2-digit"}), color:user.color }]);
    setTexto("");
  };

  return (
    <div>
      <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap" }}>
        <KPI label="Objetivo hoy" value={objetivo} sub="tortas equiv." color={G} />
        <KPI label="Producido" value={total} sub="hasta ahora" color={AM} />
        <KPI label="Avance" value={`${Math.round(total/objetivo*100)}%`} sub="del objetivo" color="#0891b2" />
      </div>
      <div style={{ background:"#fff", borderRadius:8, overflow:"hidden", marginBottom:12 }}>
        <div style={{ background:GD, color:"#fff", padding:"8px 12px", fontWeight:700, fontSize:12 }}>
          📋 Producción del día — {new Date().toLocaleDateString("es-UY")}
        </div>
        {prod.map((p,i)=>(
          <div key={p.sabor} style={{ padding:"12px 14px", borderBottom:"1px solid #f3f4f6", background:i%2===0?"#fff":"#f9fafb" }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
              <span style={{ fontWeight:600, fontSize:12, color:GD }}>{p.sabor}</span>
              <span style={{ fontSize:11, color:GR }}>Objetivo: {p.objetivo}</span>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ flex:1 }}><Bar pct={(p.producido/p.objetivo)*100} color={p.producido>=p.objetivo?G:AM} h={12} /></div>
              <button onClick={()=>setProd(pr=>pr.map((x,j)=>j===i?{...x,producido:Math.max(0,x.producido-1)}:x))}
                style={{ width:28,height:28,borderRadius:4,border:"1px solid #e5e7eb",background:"#fff",cursor:"pointer",fontWeight:700,fontSize:16 }}>-</button>
              <span style={{ fontWeight:900,fontSize:14,color:p.producido>=p.objetivo?G:AM,minWidth:32,textAlign:"center" }}>{p.producido}</span>
              <button onClick={()=>setProd(pr=>pr.map((x,j)=>j===i?{...x,producido:x.producido+1}:x))}
                style={{ width:28,height:28,borderRadius:4,border:`1px solid ${G}`,background:GL,cursor:"pointer",fontWeight:700,color:G,fontSize:16 }}>+</button>
            </div>
          </div>
        ))}
        <div style={{ padding:"10px 14px",background:GD,display:"flex",justifyContent:"space-between" }}>
          <span style={{ color:"#fff",fontWeight:700,fontSize:12 }}>Total producido</span>
          <span style={{ color:"#fff",fontWeight:900,fontSize:14 }}>{total} uds</span>
        </div>
      </div>
      <div style={{ background:"#fff", borderRadius:8, overflow:"hidden" }}>
        <div style={{ background:GD,color:"#fff",padding:"8px 12px",fontWeight:700,fontSize:12 }}>💬 Novedades del día</div>
        <div style={{ padding:12,maxHeight:180,overflowY:"auto" }}>

              <div style={{ display:"flex",justifyContent:"space-between",marginBottom:2 }}>
                <span style={{ fontWeight:700,fontSize:11,color:n.color }}>{n.autor}</span>
                <span style={{ fontSize:10,color:GR }}>{n.hora}</span>
              </div>
              <div style={{ fontSize:11,color:"#374151" }}>{n.texto}</div>
            </div>

        </div>
        <div style={{ padding:10,borderTop:"1px solid #e5e7eb",display:"flex",gap:8 }}>
          <input value={texto} onChange={e=>setTexto(e.target.value)} onKeyDown={e=>e.key==="Enter"&&enviar()}

            style={{ flex:1,padding:"8px 10px",border:"1px solid #e5e7eb",borderRadius:6,fontSize:11,outline:"none" }} />

            style={{ background:G,color:"#fff",border:"none",borderRadius:6,padding:"8px 14px",fontWeight:700,cursor:"pointer",fontSize:11 }}>Enviar</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [seccion, setSeccion] = useState(null);
  const [loginKey, setLoginKey] = useState("admin");
  const [loginPass, setLoginPass] = useState("");
  const [error, setError] = useState("");

  const login = () => {
    const u = USERS[loginKey];
    if (u && loginPass === u.pass) { setUser({...u,key:loginKey}); setError(""); setLoginPass(""); }
    else setError("Contraseña incorrecta");
  };

  if (!user) return (
    <div style={{ minHeight:"100vh",background:GD,display:"flex",alignItems:"center",justifyContent:"center",padding:20 }}>
      <div style={{ background:"#fff",borderRadius:12,padding:32,maxWidth:360,width:"100%",boxShadow:"0 8px 32px rgba(0,0,0,0.3)" }}>
        <div style={{ textAlign:"center",marginBottom:24 }}>
          <div style={{ fontSize:36,marginBottom:8 }}>🌿</div>
          <div style={{ fontSize:22,fontWeight:900,color:GD }}>Sana a Rou</div>
          <div style={{ fontSize:11,color:GR,marginTop:4,letterSpacing:1 }}>PORTAL INTERNO</div>
        </div>
        <div style={{ marginBottom:12 }}>
          <label style={{ fontSize:11,color:GR,fontWeight:600,display:"block",marginBottom:4 }}>Usuario</label>
          <select value={loginKey} onChange={e=>setLoginKey(e.target.value)}
            style={{ width:"100%",padding:"10px 12px",border:"1px solid #e5e7eb",borderRadius:8,fontSize:13,outline:"none" }}>
            {Object.entries(USERS).map(([k,u])=>(
              <option key={k} value={k}>{u.emoji} {u.nombre}</option>
            ))}
          </select>
        </div>
        <div style={{ marginBottom:16 }}>
          <label style={{ fontSize:11,color:GR,fontWeight:600,display:"block",marginBottom:4 }}>Contraseña</label>
          <input type="password" value={loginPass} onChange={e=>setLoginPass(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&login()} placeholder="••••••••"
            style={{ width:"100%",padding:"10px 12px",border:`1px solid ${error?"#fca5a5":"#e5e7eb"}`,borderRadius:8,fontSize:13,outline:"none" }} />
        </div>
        {error && <div style={{ color:RD,fontSize:11,marginBottom:12,fontWeight:600 }}>⚠️ {error}</div>}
        <button onClick={login}
          style={{ width:"100%",background:G,color:"#fff",border:"none",borderRadius:8,padding:"12px",fontWeight:700,cursor:"pointer",fontSize:14 }}>
          Entrar
        </button>
        <div style={{ fontSize:10,color:GR,marginTop:14,textAlign:"center" }}>
          Contactá a administración si no recordás tu contraseña.
        </div>
      </div>
    </div>
  );

  const seccionesVisibles = secciones.filter(s=>user.acceso.includes(s.id));

  if (!seccion) return (
    <div style={{ minHeight:"100vh",background:"#f3f4f6" }}>
      <div style={{ background:GD,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
        <div>
          <div style={{ fontSize:16,fontWeight:900,color:"#fff" }}>🌿 Sana a Rou</div>
          <div style={{ fontSize:10,color:"#a5b4a0",letterSpacing:1 }}>PORTAL INTERNO</div>
        </div>
        <div style={{ display:"flex",alignItems:"center",gap:10 }}>
          <span style={{ fontSize:18 }}>{user.emoji}</span>
          <div>
            <div style={{ fontWeight:700,fontSize:12,color:"#fff" }}>{user.nombre}</div>
            <div style={{ fontSize:10,color:"#a5b4a0" }}>{user.rol}</div>
          </div>
          <button onClick={()=>{setUser(null);setSeccion(null);}}
            style={{ background:"rgba(255,255,255,0.1)",border:"none",color:"#fff",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:11,marginLeft:8 }}>
            Salir
          </button>
        </div>
      </div>
      <div style={{ padding:20 }}>
        <div style={{ fontSize:14,color:GD,fontWeight:700,marginBottom:16 }}>Bienvenida/o, {user.nombre} 👋</div>
        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:12 }}>
          {seccionesVisibles.map(s=>(
            <button key={s.id} onClick={()=>setSeccion(s.id)}
              style={{ background:"#fff",borderRadius:10,padding:"20px 16px",border:`2px solid ${s.color}22`,
                borderTop:`4px solid ${s.color}`,cursor:"pointer",textAlign:"left",boxShadow:"0 2px 8px rgba(0,0,0,0.06)" }}>
              <div style={{ fontSize:22,marginBottom:6 }}>{s.label.split(" ")[0]}</div>
              <div style={{ fontWeight:700,fontSize:13,color:s.color }}>{s.label.slice(3)}</div>
              <div style={{ fontSize:11,color:GR,marginTop:3 }}>{s.desc}</div>
            </button>
          ))}
        </div>
        {user.acceso.length < 4 && (
          <div style={{ marginTop:14,padding:"10px 14px",background:"#fef9c3",borderRadius:8,fontSize:11,color:AM,fontWeight:600 }}>
            🔒 Tenés acceso a {user.acceso.length} de {secciones.length} secciones
          </div>
        )}
